# This file tells Railway to build from the backend directory
[phases.setup]
nixPkgs = ["python311", "postgresql"]
onlyIncludeFiles = ["backend"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd backend && echo 'Build complete'"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
PYTHON_VERSION = "3.11"
